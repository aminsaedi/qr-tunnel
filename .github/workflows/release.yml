name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match vX.Y.Z (e.g. v0.1.0)"
            exit 1
          fi

      - name: Run tests
        run: go test ./internal/... -race -timeout 120s

      - name: Build and package all targets
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ inputs.version }}
        run: |
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          mkdir -p dist

          # Build each target, package as tar.gz (unix) or zip (windows)
          for pair in "darwin amd64" "darwin arm64" "linux amd64" "linux arm64" "windows amd64"; do
            OS=$(echo $pair | cut -d' ' -f1)
            ARCH=$(echo $pair | cut -d' ' -f2)
            BIN="qr-tunnel"
            if [ "$OS" = "windows" ]; then BIN="qr-tunnel.exe"; fi

            echo "Building ${OS}/${ARCH}..."
            GOOS=$OS GOARCH=$ARCH go build -ldflags="$LDFLAGS" -o "dist/${BIN}" ./cmd/qr-tunnel

            cd dist
            ARCHIVE="qr-tunnel-${OS}-${ARCH}"
            if [ "$OS" = "windows" ]; then
              zip "${ARCHIVE}.zip" "$BIN"
            else
              tar czf "${ARCHIVE}.tar.gz" "$BIN"
            fi
            rm "$BIN"
            cd ..
          done

          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create git tag
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: dist/*
